<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saikou</title>

    <style>

        body{
            margin:0;
            background:#1E1E1E;
            font-family:Arial;
            color:white;
        }

        /* NAVBAR */

        .navbar{
            width:50%;
            height:10px;

            display:flex;

            margin:auto;
            margin-top:70px;
        }

        .nav{
            flex:1;
            transition:0.4s;
        }

        .nav:hover{
            flex:2;
            height:20px;
        }

        .blue{
            background:#88C1B0;
        }

        .yellow{
            background:#EDA93C;
        }

        .red{
            background:#9A2D28;
        }

        /* HERO */

        .hero{
            height:80vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .hero h1{
            color:#E86031;
            font-size:90px;
        }

        /* CARD */

        .card{
            width:40%;

            margin:auto;
            margin-bottom:100px;

            background:black;

            padding:50px;

            border-top:25px solid #88C1B0;
        }

        .card h2{
            font-size:50px;
        }

        .card p{
            line-height:1.7;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="nav blue"></div>
        <div class="nav yellow"></div>
        <div class="nav red"></div>

    </div>

    <!-- HERO -->

    <section class="hero">

        <h1>SAIKOU</h1>

    </section>

    <!-- ABOUT -->

    <div class="card">

        <h2>ABOUT ME</h2>

        <p>
            Hello, I'm Saikou.
            I've been playing Arknights since February 2020.
        </p>

    </div>

</body>

</html>
